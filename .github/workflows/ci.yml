name: ZoneWatch Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: 22.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run TypeScript Compile Check
      run: npx tsc --noEmit

    - name: Run ESLint
      run: npm run lint

    - name: Run Unit Tests
      run: npm test
